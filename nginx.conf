# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name thefiberdad.com www.thefiberdad.com;
    server_tokens off;
    return 301 https://$host$request_uri;
}

# HTTPS — Cloudflare Origin Certificate
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thefiberdad.com www.thefiberdad.com;

    ssl_certificate     /etc/ssl/cloudflare/thefiberdad.crt;
    ssl_certificate_key /etc/ssl/cloudflare/thefiberdad.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    server_tokens off;

    root /var/www/thefiberdad;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css text/javascript application/javascript image/svg+xml;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://chat.thedadfirewall.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://chat.thedadfirewall.com; connect-src 'self' https://api.web3forms.com https://chat.thedadfirewall.com wss://chat.thedadfirewall.com; frame-src https://chat.thedadfirewall.com; frame-ancestors 'none';" always;

    # Cache static assets — security headers repeated due to nginx inheritance rules
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|webp|woff2|woff|ttf|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny dotfile access
    location ~ /\. {
        deny all;
    }
}
