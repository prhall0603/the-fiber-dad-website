# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name chat.thedadfirewall.com;
    server_tokens off;
    return 301 https://$host$request_uri;
}

# HTTPS — Cloudflare Origin Certificate (wildcard *.thedadfirewall.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.thedadfirewall.com;

    ssl_certificate     /etc/ssl/cloudflare/thedadfirewall.crt;
    ssl_certificate_key /etc/ssl/cloudflare/thedadfirewall.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    server_tokens off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to chatbot server
    location / {
        proxy_pass         http://192.168.53.137:8000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
    }
}
